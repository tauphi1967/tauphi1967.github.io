<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΤΦ | Tau Phi</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #081c12;
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: #052214;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #9fe870;
}

.nav a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
}

.hero {
    height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.7)),
    url('hero.jpg') center/cover no-repeat;
}

.hero h1 {
    font-size: 60px;
}

.section {
    padding: 80px 20px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: #0e2a1b;
    padding: 20px;
    border-radius: 15px;
}

img {
    width: 100%;
    border-radius: 15px;
}

.footer {
    text-align: center;
    padding: 20px;
    background: #04120b;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">ΤΦ</div>
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Photos</a>
    </div>
</div>

<div class="hero">
    <div>
        <h1>Tau Phi Fraternity</h1>
        <p>Established 1967</p>
    </div>
</div>

<div class="section">
    <h2>About ΤΦ</h2>
    <p>Built on brotherhood, tradition, and pride.</p>
    <br><br>
    <img src="about.jpg">
</div>

<div class="section">
    <h2>Events & Brotherhood</h2>

    <div class="grid">
        <div class="card">
            <img src="event1.jpg">
        </div>

        <div class="card">
            <img src="event2.jpg">
        </div>

        <div class="card">
            <img src="event3.jpg">
        </div>
    </div>
</div>

<div class="footer">
    © 2026 ΤΦ Tau Phi
</div>

</body>
</html>
