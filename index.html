<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ΤΦ | Tau Phi Fraternity</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, sans-serif;
      background: #06160f;
      color: white;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: rgba(4, 23, 15, 0.88);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(159, 232, 112, 0.15);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: #9fe870;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: #e8f7e1;
      font-size: 0.95rem;
      transition: 0.25s;
    }

    .nav-links a:hover {
      color: #9fe870;
    }

    .panel {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 40px 60px;
      position: relative;
    }

    .hero {
      background:
        linear-gradient(rgba(0,0,0,0.52), rgba(0,0,0,0.68)),
        url('9c8e1b10-38a4-4ec0-9683-bb29f8cf9bcd.png') center/cover no-repeat;
      text-align: center;
    }

</html>
